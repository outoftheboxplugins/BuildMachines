name: Package Plugin (GitHub Release)

on:
  workflow_call:
    inputs:
      plugin_name:
        default: "${{ github.event.repository.name }}"
        type: string
      exclude_patterns:
        default: "-x \"LICENSE\" -x \".github/*\" -x \".git/*\""
        type: string
      engine_versions:
        description: 'JSON array of UE versions to build for, e.g. ''["5.4","5.5","5.6","5.7"]'''
        default: '["5.5","5.6","5.7"]'
        type: string

jobs:
  build-archives:
    runs-on: ubuntu-latest
    name: 📦 Package Plugin
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.engine_versions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: jossef/action-set-json-field@v2
        with:
          file: "${{ inputs.plugin_name }}.uplugin"
          field: VersionName
          value: "${{ github.ref_name }}"

      - uses: jossef/action-set-json-field@v2
        with:
          file: "${{ inputs.plugin_name }}.uplugin"
          field: EngineVersion
          value: "${{ matrix.version }}"

      - name: Archive files
        run: |
          zip -r "${{ inputs.plugin_name }}-${{ github.ref_name }}-${{ matrix.version }}.zip" . ${{ inputs.exclude_patterns }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plugin_name }}-${{ matrix.version }}"
          path: "${{ inputs.plugin_name }}-${{ github.ref_name }}-${{ matrix.version }}.zip"

  release:
    runs-on: ubuntu-latest
    name: 🚀 Publish Release
    needs: build-archives
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*.zip
