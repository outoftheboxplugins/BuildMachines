name: 'Publish Horde Server Plugins'
description: 'Pack server plugins and push them to nuget.org'

inputs:
  pack-dir:
    description: 'Directory containing the plugin folders to pack (from install-server-plugins output)'
    required: true
  version:
    description: 'Version to stamp on each .nupkg'
    required: true
  plugins:
    description: 'Newline-separated list of plugin names (folder names under pack-dir)'
    required: true
  nuget-api-key:
    description: 'API key for pushing to nuget.org'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Publish Server plugins
      shell: bash
      working-directory: ${{ inputs.pack-dir }}
      run: |
        while IFS= read -r name; do
          [ -z "$name" ] && continue

          echo "Getting csproj name from $name"
          csproj_name=$(basename "$name")

          echo "Packing $csproj_name (version ${{ inputs.version }})"
          dotnet pack "$csproj_name/$csproj_name.csproj" \
            -c Release \
            -p:Version=${{ inputs.version }} \
            -o "nupkgs/$csproj_name"

          echo "Pushing $csproj_name to nuget.org"
          dotnet nuget push "nupkgs/$csproj_name"/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ inputs.nuget-api-key }} \
            --skip-duplicate
        done <<< "${{ inputs.plugins }}"
